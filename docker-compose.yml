services:
  mysql:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: root_change_me
      MYSQL_DATABASE: tg_marketing
      MYSQL_USER: tg_user
      MYSQL_PASSWORD: change_me
    volumes:
      - mysql_data:/var/lib/mysql
      - ./deploy/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "3306:3306"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    volumes:
      - telegram_sessions:/app/telegram_sessions
    depends_on:
      - mysql
      - redis
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "8080:80"
    restart: unless-stopped

volumes:
  mysql_data:
  telegram_sessions:
