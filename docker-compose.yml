services:
  mysql:
    image: mysql:8.0
    container_name: tg-marketing-mysql
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_change_me}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-tg_marketing}
      MYSQL_USER: ${MYSQL_USER:-tg_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change_me}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./deploy/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: tg-marketing-redis
    command: ["redis-server", "--appendonly", "yes"]
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tg-marketing-backend
    env_file:
      - ./backend/.env
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      SESSION_WORKER_COUNT: 6
    volumes:
      - telegram_sessions:/app/telegram_sessions
      - ./backend/static:/app/static
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)\""]
      interval: 20s
      timeout: 8s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  session_worker_0:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["python", "session_worker.py"]
    env_file:
      - ./backend/.env
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      APP_ROLE: session_worker
      SESSION_WORKER_INDEX: 0
      SESSION_WORKER_COUNT: 6
      SESSION_CONNECT_CONCURRENCY: 5
      ENABLE_TASK_QUEUE: "false"
      SESSION_STARTUP_HISTORY_SYNC: "true"
      SESSION_HISTORY_SYNC_DAYS: 2
      INBOUND_DB_WORKERS: 1
    volumes:
      - telegram_sessions:/app/telegram_sessions
      - ./backend/static:/app/static
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os; os.kill(1, 0)\""]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

