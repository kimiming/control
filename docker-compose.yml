  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tg-marketing-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1"]
      interval: 20s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mysql_data:
    name: control_mysql_data
  redis_data:
    name: tg_marketing_redis_data
  telegram_sessions:
    name: control_telegram_sessions
